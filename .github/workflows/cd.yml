name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
      
jobs:
  deploy-backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli@3.11.0 
        
      - name: Deploy Backend to Railway
        run: railway redeploy --service ${{ secrets.RAILWAY_SERVICE_ID }} -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend 
    if: ${{ success() }}
    steps:
      - name: Trigger Vercel Deploy
        run: |
          RESPONSE_BODY=$(curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel Response: $RESPONSE_BODY"
          
          if [[ "$RESPONSE_BODY" == *"job"* ]]; then
            echo "Vercel deployment successfully queued."
          else
            echo "Unexpected response from Vercel"
            exit 1
          fi
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
