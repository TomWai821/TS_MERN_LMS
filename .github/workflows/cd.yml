name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    paths-ignore:
      - 'README.md'
      - 'doc/**'
      
jobs:
  deploy-backend:
    needs: push-to-aws
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve image digest from ECR with retries
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ts_mern_lms-backend
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -e
          DIGEST=""
          for i in 1 2 3 4 5; do
            DIGEST=$(aws ecr describe-images \
              --repository-name "$ECR_REPOSITORY" \
              --image-ids imageTag="$IMAGE_TAG" \
              --region "$AWS_REGION" \
              --query 'imageDetails[0].imageDigest' --output text 2>/dev/null || true)
            if [ -n "$DIGEST" ] && [ "$DIGEST" != "None" ]; then
              echo "Found digest: $DIGEST"
              break
            fi
            echo "Digest not found yet, retrying ($i)..."
            sleep 5
          done
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "ERROR: Failed to obtain image digest for tag $IMAGE_TAG" >&2
            exit 1
          fi
          echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV

      - name: Update Lambda with image digest
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          if [ -n "${{ secrets.ECR_REGISTRY }}" ]; then
            REGISTRY="${{ secrets.ECR_REGISTRY }}"
          else
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            REGISTRY="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com"
          fi
          IMAGE="$REGISTRY/ts_mern_lms-backend@${IMAGE_DIGEST}"
          echo "Updating Lambda with $IMAGE"
          aws lambda update-function-code \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --image-uri "$IMAGE" \
            --region $AWS_REGION


  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend 
    if: ${{ success() }}
    steps:
      - name: Trigger Vercel Deploy
        run: |
         RESPONSE=$(curl -s -X POST -w "%{http_code}" "${{ secrets.VERCEL_DEPLOY_HOOK }}" -o response.json)
          HTTP_CODE=$RESPONSE
          RESPONSE_BODY=$(cat response.json)

          echo "Vercel HTTP Code: $HTTP_CODE"
          echo "Vercel Response: $RESPONSE_BODY"

          if [ "$HTTP_CODE" -eq 201 ] || [ "$HTTP_CODE" -eq 200 ]; then
            echo "Vercel deployment triggered successfully!"
          else
            echo "Error: Vercel API failed with constants $HTTP_CODE"
            exit 1
          fi
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
