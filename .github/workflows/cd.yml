name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
      
jobs:
  deploy-backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Railway Redeploy via GraphQL
        run: |
          QUERY="mutation { environmentTriggersDeploy(input: { projectId: \"${{ secrets.RAILWAY_PROJECT_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\" }) }"
          PAYLOAD="{\"query\": \"$QUERY\"}"

          RESPONSE_CODE=$(curl -s -X POST \
            --url "https://backboard.railway.app" \
            --header "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD" \
            -o response.json -w "%{http_code}")

          echo "Railway Response Code: $RESPONSE_CODE"

          # 3. 讀取並打印 Response Body (這就是 Error Message 所在)
          RESPONSE_BODY=$(cat response.json)

          if [ "$RESPONSE_CODE" -ne 200 ]; then
            echo "Error: API returned $RESPONSE_CODE"
            echo "Detailed Error Message: $RESPONSE_BODY"
            exit 1
          else
            if [[ "$RESPONSE_BODY" == *"errors"* ]]; then
              echo "Deployment Failed (GraphQL Error):"
              echo "$RESPONSE_BODY"
              exit 1
            fi
            echo "Deployment triggered successfully!"
            echo "$RESPONSE_BODY"
          fi


  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend 
    if: ${{ success() }}
    steps:
      - name: Trigger Vercel Deploy
        run: |
         RESPONSE=$(curl -s -X POST -w "%{http_code}" "${{ secrets.VERCEL_DEPLOY_HOOK }}" -o response.json)
          HTTP_CODE=$RESPONSE
          RESPONSE_BODY=$(cat response.json)

          echo "Vercel HTTP Code: $HTTP_CODE"
          echo "Vercel Response: $RESPONSE_BODY"

          if [ "$HTTP_CODE" -eq 201 ] || [ "$HTTP_CODE" -eq 200 ]; then
            echo "Vercel deployment triggered successfully!"
          else
            echo "Error: Vercel API failed with constants $HTTP_CODE"
            exit 1
          fi
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
